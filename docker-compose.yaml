version: '3.8'

services:
  mysql:
    container_name: mysql
    image: percona/percona-server:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: evolution
      TZ: "Asia/Kolkata"
    ports:
      - "3307:3307"
    networks:
      - evolution-net
    volumes:
      - mysql_data:/var/lib/mysql

  evolution-api:
    container_name: evolution-api
    platform: linux/amd64   
    image: atendai/evolution-api:v1.8.7
    depends_on:
      - mysql
    restart: always
    environment:
      AUTHENTICATION_API_KEY: "YOUR_API_KEY"
      SERVER_URL: "http://localhost:8080"
      DATABASE_ENABLED: "false"
      DATABASE_PROVIDER: "mysql"
      DATABASE_CONNECTION_URI: "mysql://YOUR_DB_USERNAME:YOUR_DB_PASSWORD@mysql:3306/evolution?schema=public"
      DATABASE_CONNECTION_CLIENT_NAME: "evolution_exchange"
      TZ: "Asia/Kolkata"
    ports:
      - "8080:8080"
    networks:
      - evolution-net
    volumes:
      - evolution_sessions:/app/sessions

volumes:
  mysql_data:
  evolution_sessions:

networks:
  evolution-net:
    driver: bridge


